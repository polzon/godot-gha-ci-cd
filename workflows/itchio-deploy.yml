---
name: "itch.io deploy"

on:
  workflow_call:
    inputs:
      deploy_version:
        description: 'Deploy version label for butler --userversion'
        required: true
        type: string
      build_web:
        description: 'Build Web export'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows exports'
        required: false
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux exports'
        required: false
        default: true
        type: boolean
      build_android:
        description: 'Build Android exports'
        required: false
        default: true
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    name: Deploy Artifacts to itch.io
    runs-on: ubuntu-latest
    steps:
      - name: Download Web Artifact
        if: ${{ inputs.build_web }}
        uses: actions/download-artifact@v4
        with:
          name: quintessence-web
          path: artifacts/web

      - name: Download Windows x86_64 Artifact
        if: ${{ inputs.build_windows }}
        uses: actions/download-artifact@v4
        with:
          name: quintessence-windows-x86_64
          path: artifacts/windows-x86_64

      - name: Download Windows arm64 Artifact
        if: ${{ inputs.build_windows }}
        uses: actions/download-artifact@v4
        with:
          name: quintessence-windows-arm64
          path: artifacts/windows-arm64

      - name: Download Linux x86_64 Artifact
        if: ${{ inputs.build_linux }}
        uses: actions/download-artifact@v4
        with:
          name: quintessence-linux-x86_64
          path: artifacts/linux-x86_64

      - name: Download Linux arm64 Artifact
        if: ${{ inputs.build_linux }}
        uses: actions/download-artifact@v4
        with:
          name: quintessence-linux-arm64
          path: artifacts/linux-arm64

      - name: Download Android Artifact
        if: ${{ inputs.build_android }}
        uses: actions/download-artifact@v4
        with:
          name: quintessence-android
          path: artifacts/android

      - name: Setup butler
        uses: remarkablegames/setup-butler@v2.0.5

      - name: Deploy Web to itch.io
        if: ${{ inputs.build_web }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY || secrets.butler_api_key }}
        run: |
          butler push \
            artifacts/web \
            polzon/quintessence:web \
            --userversion ${{ inputs.deploy_version }}

      - name: Deploy Windows x86_64 to itch.io
        if: ${{ inputs.build_windows }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY || secrets.butler_api_key }}
        run: |
          butler push \
            artifacts/windows-x86_64/Quintessence_win_x86_64.exe \
            polzon/quintessence:win-x86_64 \
            --userversion ${{ inputs.deploy_version }}

      - name: Deploy Windows arm64 to itch.io
        if: ${{ inputs.build_windows }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY || secrets.butler_api_key }}
        run: |
          butler push \
            artifacts/windows-arm64/Quintessence_win_arm64.exe \
            polzon/quintessence:win-arm64 \
            --userversion ${{ inputs.deploy_version }}

      - name: Deploy Linux x86_64 to itch.io
        if: ${{ inputs.build_linux }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY || secrets.butler_api_key }}
        run: |
          butler push \
            artifacts/linux-x86_64/Quintessence.x86_64 \
            polzon/quintessence:linux-x86_64 \
            --userversion ${{ inputs.deploy_version }}

      - name: Deploy Linux arm64 to itch.io
        if: ${{ inputs.build_linux }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY || secrets.butler_api_key }}
        run: |
          butler push \
            artifacts/linux-arm64/Quintessence.arm64 \
            polzon/quintessence:linux-arm64 \
            --userversion ${{ inputs.deploy_version }}

      - name: Deploy Android APK to itch.io
        if: ${{ inputs.build_android }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY || secrets.butler_api_key }}
        continue-on-error: true
        run: |
          if [ -f "artifacts/android/Quintessence.apk" ]; then
            butler push \
              artifacts/android/Quintessence.apk \
              polzon/quintessence:android-apk \
              --userversion ${{ inputs.deploy_version }}
          else
            echo "Android APK not found, skipping upload"
          fi
