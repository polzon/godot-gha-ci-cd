---
name: "itch.io deploy nightly"

on:
  schedule:
    - cron: "37 13 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-if-changed:
    name: Dispatch godot-ci nightly build
    runs-on: ubuntu-latest
    steps:
      - name: Check for new commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          api_base="https://api.github.com/repos/${REPO}"
          latest_sha=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$api_base/commits/main" | jq -r '.sha')
          last_sha=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$api_base/actions/workflows/godot-ci.yml/runs?branch=main&status=success&per_page=1" | jq -r '.workflow_runs[0].head_sha // empty')

          if [ -z "$latest_sha" ]; then
            echo "Unable to determine latest commit; aborting dispatch."
            exit 1
          fi

          if [ -z "$last_sha" ]; then
            echo "No previous successful godot-ci run found; dispatching."
            dispatch=true
          elif [ "$latest_sha" = "$last_sha" ]; then
            echo "No new commits since last deploy; skipping dispatch."
            dispatch=false
          else
            echo "New commit detected; dispatching."
            dispatch=true
          fi

          if [ "$dispatch" = "true" ]; then
            payload='{"ref":"main"}'
            url="$api_base/actions/workflows/godot-ci.yml/dispatches"
            curl -sS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d "$payload" \
              "$url"
          fi
